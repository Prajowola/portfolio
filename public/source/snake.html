<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Snake — by Prajowola Adhikari</title>
<style>
  :root { --plum:#5d3b6e; --rose:#e78bb7; --lav:#b9a7e6; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: linear-gradient(135deg, #fff8f4 0%, #ffeef8 45%, #f0e9ff 100%);
    color: var(--plum); padding: 24px;
  }
  h1 { margin: 0; font-size: 1.8rem; }
  #score { font-weight: 700; font-size: 1.1rem; }
  .stage { position: relative; }
  canvas { border-radius: 16px; border: 1px solid rgba(93,59,110,.15); background: rgba(255,255,255,.7); max-width: 100%; }
  .overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; background: rgba(255,255,255,.75); border-radius: 16px;
  }
  .overlay.hidden { display: none; }
  button.play {
    border: 0; cursor: pointer; padding: 10px 24px; border-radius: 999px; font-weight: 700; color: #fff;
    background: linear-gradient(90deg, var(--rose), var(--lav)); font-size: .9rem;
  }
  .pad { display: grid; grid-template-columns: repeat(3, 48px); gap: 8px; }
  .pad button { height: 48px; border: 0; border-radius: 12px; background: rgba(255,255,255,.85); color: var(--plum); font-size: 1.2rem; cursor: pointer; }
  .pad .spacer { visibility: hidden; }
  footer { font-size: .8rem; color: rgba(93,59,110,.6); }
</style>
</head>
<body>
  <h1>Snake</h1>
  <div id="score">Score: 0</div>
  <div class="stage">
    <canvas id="c" width="360" height="360"></canvas>
    <div class="overlay" id="overlay">
      <div id="msg"></div>
      <button class="play" id="play">Start game</button>
    </div>
  </div>
  <div class="pad">
    <span class="spacer"></span><button data-dir="up">▲</button><span class="spacer"></span>
    <button data-dir="left">◀</button><button data-dir="down">▼</button><button data-dir="right">▶</button>
  </div>
  <footer>Arrow keys / WASD / on-screen pad · built with the HTML canvas &amp; JavaScript</footer>

<script>
  const CELLS = 20, CELL = 18, SIZE = CELLS * CELL, SPEED = 110;
  const ctx = document.getElementById('c').getContext('2d');
  const scoreEl = document.getElementById('score');
  const overlay = document.getElementById('overlay');
  const msg = document.getElementById('msg');

  let snake, dir, next, food, score, timer = null;

  function randomFood() {
    let f;
    do { f = { x: Math.floor(Math.random()*CELLS), y: Math.floor(Math.random()*CELLS) }; }
    while (snake.some(s => s.x===f.x && s.y===f.y));
    return f;
  }

  function draw() {
    ctx.clearRect(0,0,SIZE,SIZE);
    ctx.fillStyle = '#e78bb7';
    ctx.beginPath();
    ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
    ctx.fill();
    snake.forEach((s, i) => {
      ctx.fillStyle = i===0 ? '#5d3b6e' : '#9b7bb8';
      ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
    });
  }

  function step() {
    dir = next;
    const head = { x: snake[0].x+dir.x, y: snake[0].y+dir.y };
    if (head.x<0 || head.y<0 || head.x>=CELLS || head.y>=CELLS || snake.some(s=>s.x===head.x&&s.y===head.y)) {
      stop('Game over — score ' + score);
      return;
    }
    snake.unshift(head);
    if (head.x===food.x && head.y===food.y) { score++; scoreEl.textContent='Score: '+score; food=randomFood(); }
    else snake.pop();
    draw();
  }

  function setDir(x, y) {
    if (dir.x + x === 0 && dir.y + y === 0) return; // no reversing
    next = { x, y };
  }

  function start() {
    snake = [{x:8,y:10},{x:7,y:10},{x:6,y:10}];
    dir = { x:1, y:0 }; next = { x:1, y:0 };
    score = 0; scoreEl.textContent = 'Score: 0';
    food = randomFood();
    overlay.classList.add('hidden');
    draw();
    timer = setInterval(step, SPEED);
  }

  function stop(text) {
    clearInterval(timer); timer = null;
    msg.textContent = text;
    document.getElementById('play').textContent = 'Play again';
    overlay.classList.remove('hidden');
  }

  document.addEventListener('keydown', (e) => {
    const map = { ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0], w:[0,-1], s:[0,1], a:[-1,0], d:[1,0] };
    const m = map[e.key]; if (!m) return; e.preventDefault();
    if (timer) setDir(m[0], m[1]);
  });
  document.querySelectorAll('.pad button').forEach(b => {
    const map = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
    b.onclick = () => { if (timer) setDir(...map[b.dataset.dir]); };
  });
  document.getElementById('play').onclick = start;
</script>
</body>
</html>
