<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tic-Tac-Toe — by Prajowola Adhikari</title>
<style>
  :root { --plum:#5d3b6e; --rose:#e78bb7; --lav:#b9a7e6; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: linear-gradient(135deg, #fff8f4 0%, #ffeef8 45%, #f0e9ff 100%);
    color: var(--plum); padding: 24px;
  }
  h1 { margin: 0; font-size: 1.8rem; }
  .controls { display: inline-flex; background: rgba(255,255,255,.7); border-radius: 999px; padding: 4px; }
  .controls button {
    border: 0; background: transparent; cursor: pointer; padding: 8px 18px;
    border-radius: 999px; font-weight: 600; color: rgba(93,59,110,.7); font-size: .9rem;
  }
  .controls button.active { background: linear-gradient(90deg, var(--rose), var(--lav)); color: #fff; }
  #status { font-weight: 700; font-size: 1.1rem; min-height: 1.4rem; }
  #board { display: grid; grid-template-columns: repeat(3, 92px); gap: 8px; }
  .cell {
    height: 92px; width: 92px; border: 0; border-radius: 18px; cursor: pointer;
    background: rgba(255,255,255,.85); color: var(--plum); font-size: 2.6rem; font-weight: 800;
    transition: transform .1s ease;
  }
  .cell:hover:not(:disabled) { transform: translateY(-2px); }
  .cell.win { background: linear-gradient(135deg, var(--rose), var(--lav)); color: #fff; }
  .reset {
    border: 0; cursor: pointer; padding: 10px 24px; border-radius: 999px; font-weight: 700; color: #fff;
    background: linear-gradient(90deg, var(--rose), var(--lav)); font-size: .9rem;
  }
  footer { font-size: .8rem; color: rgba(93,59,110,.6); }
</style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>
  <div class="controls" id="difficulty">
    <button data-level="easy">Easy</button>
    <button data-level="medium">Medium</button>
    <button data-level="hard" class="active">Hard</button>
  </div>
  <div id="status">Your turn (X)</div>
  <div id="board"></div>
  <button class="reset" id="reset">New game</button>
  <footer>You are X · the computer is O · built with plain HTML, CSS &amp; JavaScript</footer>

<script>
  const LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  let board = Array(9).fill(null);
  let level = 'hard';
  let locked = false;

  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');

  function winner(b) {
    for (const [a,c,d] of LINES) if (b[a] && b[a]===b[c] && b[a]===b[d]) return { p:b[a], line:[a,c,d] };
    return null;
  }
  const full = (b) => b.every(Boolean);
  const empties = (b) => b.map((v,i)=>v?null:i).filter(i=>i!==null);

  function findLine(b, p) {
    for (const line of LINES) {
      const marks = line.map(i=>b[i]);
      if (marks.filter(m=>m===p).length===2 && marks.includes(null)) return line[marks.indexOf(null)];
    }
    return null;
  }

  // computer = 'O', human = 'X'
  function minimax(b, isMax) {
    const w = winner(b);
    if (w) return { score: w.p==='O' ? 1 : -1 };
    if (full(b)) return { score: 0 };
    let best = isMax ? { score:-Infinity } : { score:Infinity };
    for (let i=0;i<9;i++) {
      if (b[i]) continue;
      b[i] = isMax ? 'O' : 'X';
      const { score } = minimax(b, !isMax);
      b[i] = null;
      if (isMax ? score>best.score : score<best.score) best = { score, move:i };
    }
    return best;
  }

  function chooseMove(b) {
    const open = empties(b);
    const random = () => open[Math.floor(Math.random()*open.length)];
    if (level==='easy') return random();
    if (level==='medium') {
      const m = findLine(b,'O'); if (m!==null) return m;
      const block = findLine(b,'X'); if (block!==null) return block;
      return b[4]===null ? 4 : random();
    }
    return minimax(b.slice(), true).move;
  }

  function render() {
    const w = winner(board);
    const done = w || full(board);
    statusEl.textContent = w ? (w.p==='X' ? 'You win! 🎉' : 'Computer wins 🤖')
      : full(board) ? "It's a draw 🤝" : 'Your turn (X)';
    boardEl.innerHTML = '';
    board.forEach((cell, i) => {
      const btn = document.createElement('button');
      btn.className = 'cell' + (w && w.line.includes(i) ? ' win' : '');
      btn.textContent = cell || '';
      btn.disabled = !!cell || !!done || locked;
      btn.onclick = () => play(i);
      boardEl.appendChild(btn);
    });
  }

  function play(i) {
    if (board[i] || winner(board) || full(board) || locked) return;
    board[i] = 'X';
    render();
    if (winner(board) || full(board)) return;
    locked = true;
    setTimeout(() => {
      const move = chooseMove(board);
      if (move !== undefined && move !== null) board[move] = 'O';
      locked = false;
      render();
    }, 300);
  }

  function reset() { board = Array(9).fill(null); locked = false; render(); }

  document.getElementById('difficulty').addEventListener('click', (e) => {
    const btn = e.target.closest('button'); if (!btn) return;
    level = btn.dataset.level;
    [...e.currentTarget.children].forEach(b => b.classList.toggle('active', b===btn));
    reset();
  });
  document.getElementById('reset').onclick = reset;
  render();
</script>
</body>
</html>
